<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 日文五十音特訓班 (完美日系留白版)</title>
  <style>
    /* =========================================
       🎨 UI/UX 設計：全局樣式
       ========================================= */
    :root {
      --washi-white: #FBFBF6;  
      --sakura-pink: #FFD1DC;  
      --sakura-dark: #E87A90;  
      --text-main: #4A4A4A;    
      --text-light: #9B9B9B;   
      --card-bg: #FFFFFF;
      --correct-green: #4CAF50;
      --wrong-red: #F44336;      
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--washi-white);
      color: var(--text-main);
      margin: 0; padding: 0;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%; text-align: center; padding: 25px 20px 15px;
      background: linear-gradient(180deg, #fff 0%, var(--washi-white) 100%);
      box-shadow: 0 4px 15px rgba(232, 122, 144, 0.1);
    }
    header h1 { color: var(--sakura-dark); margin: 0 0 10px 0; font-size: 30px; }
    header p { color: var(--text-light); margin: 0; font-size: 14px;}
    
    /* 模式切換按鈕 */
    .mode-switch { margin-bottom: 15px; }
    .btn-mode {
      padding: 10px 30px; font-size: 18px; font-weight: bold; border: none;
      background: #eee; color: var(--text-light); cursor: pointer;
      border-radius: 8px 8px 0 0; transition: 0.3s;
    }
    .btn-mode.active { background: var(--sakura-dark); color: #fff; }

    /* 次分類切換按鈕 */
    .controls { margin: 10px 0; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 12px 24px; font-size: 16px; font-weight: bold;
      border: 2px solid var(--sakura-dark); border-radius: 30px;
      background: transparent; color: var(--sakura-dark); cursor: pointer; transition: 0.3s;
    }
    .btn.active { background: var(--sakura-dark); color: #fff; box-shadow: 0 4px 10px rgba(232, 122, 144, 0.3); }
    .btn:hover:not(.active) { background: var(--sakura-pink); color: var(--text-main); border-color: var(--sakura-pink); }
    
    .controls.sub-tabs { gap: 10px; margin-top: 5px;}
    .btn-sub {
      padding: 8px 18px; font-size: 14px; font-weight: bold;
      border: 2px solid #F19CAE; border-radius: 20px;
      background: var(--card-bg); color: #F19CAE; cursor: pointer; transition: 0.2s;
    }
    .btn-sub.active { background: #F19CAE; color: #fff; }
    .btn-sub:hover:not(.active) { background: #FDF0F3; }

    /* =========================================
       📖 學習區網格 (極致日系留白，絕對置中)
       ========================================= */
    .kana-grid {
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 16px; 
      max-width: 800px; 
      width: 92%; 
      margin: 30px auto 40px;
    }
    
    .kana-card {
      background: var(--card-bg); 
      border-radius: 16px; 
      aspect-ratio: 1 / 1.15; 
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;     
      padding: 5px;            
      box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
      cursor: pointer; user-select: none;
      transition: transform 0.2s, box-shadow 0.2s, border-bottom 0.2s; 
      border: 2px solid transparent;
      overflow: hidden;        
    }
    
    .kana-card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 8px 20px rgba(232, 122, 144, 0.15); 
      border-bottom: 4px solid var(--sakura-dark); 
    }
    
    .kana-card.empty { background: transparent; box-shadow: none; cursor: default; pointer-events: none; }
    
    .kana-char { 
      font-size: 38px; 
      font-weight: bold; 
      color: var(--text-main); 
      margin: 0 0 10px 0; 
      padding: 0;
      line-height: 1;
      width: 100%;        
      text-align: center; 
      white-space: nowrap;
    }
    
    .kana-char.yoon-text { font-size: 26px; }

    .kana-romaji { 
      font-size: 14px; 
      color: var(--text-light); 
      margin: 0;
      padding: 0;
      line-height: 1;
      width: 100%;
      text-align: center;
    }

    /* 易混淆字元特訓區 */
    .confusing-section {
      width: 90%; max-width: 800px; margin: 0 auto 40px;
      background: #fff; padding: 30px; border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--sakura-pink);
    }
    .confusing-section h2 { color: var(--sakura-dark); text-align: center; margin-top: 0; font-size: 22px; }
    .confuse-pair { display: flex; align-items: center; padding: 15px; border-bottom: 1px dashed #eee; gap: 20px; }
    .confuse-pair:last-child { border-bottom: none; }
    .pair-chars { font-size: 32px; font-weight: bold; color: var(--text-main); width: 120px; text-align: center; flex-shrink: 0; }
    .pair-desc { font-size: 16px; line-height: 1.6; color: var(--text-main); }
    .mnemonic { background: var(--washi-white); padding: 5px 10px; border-radius: 5px; color: var(--sakura-dark); font-weight: bold; font-size: 15px; display: inline-block; margin-top: 5px;}

    /* =========================================
       🔥 測驗區專屬樣式
       ========================================= */
    #quiz-section { width: 90%; max-width: 600px; margin: 30px auto; text-align: center; display: none; flex-direction: column; align-items: center; }
    .stats-board { background: #FFF3E0; padding: 10px 20px; border-radius: 20px; color: #E65100; font-weight: bold; font-size: 14px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(230, 81, 0, 0.1); width: 100%; }
    .session-stats { background: #fff; border: 2px solid var(--sakura-pink); border-radius: 16px; padding: 15px 20px; font-size: 16px; font-weight: bold; color: var(--text-main); margin-bottom: 25px; width: 100%; display: flex; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.05); align-items: center; }
    .stat-num { font-size: 22px; margin-left: 5px; }
    .correct-text { color: var(--correct-green); }
    .wrong-text { color: var(--wrong-red); }
    .quiz-question { font-size: 80px; font-weight: bold; color: var(--sakura-dark); margin: 15px 0 25px 0; letter-spacing: 5px; text-transform: lowercase; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
    .quiz-btn { background: var(--card-bg); border: 2px solid #ddd; border-radius: 16px; padding: 30px; font-size: 40px; font-weight: bold; color: var(--text-main); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; }
    .quiz-btn:hover { background: #f9f9f9; border-color: var(--sakura-pink); transform: scale(1.02); }
    .quiz-btn.correct { background: var(--correct-green); color: white; border-color: var(--correct-green); }
    .quiz-btn.wrong { background: var(--wrong-red); color: white; border-color: var(--wrong-red); }

    /* Modal 及畫布樣式 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; position: relative; width: 90%; max-width: 350px; border: 2px solid var(--sakura-pink); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: var(--text-light); }
    .canvas-wrapper { position: relative; width: 250px; height: 250px; margin: 20px auto; border: 2px dashed var(--sakura-pink); border-radius: 12px; overflow: hidden; background-image: linear-gradient(90deg, transparent 49.5%, #f0f0f0 49.5%, #f0f0f0 50.5%, transparent 50.5%), linear-gradient(0deg, transparent 49.5%, #f0f0f0 49.5%, #f0f0f0 50.5%, transparent 50.5%); }
    #trace-char { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #F5F5F5; pointer-events: none; }
    #stroke-animation-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center;}
    #stroke-animation-container path { fill: none; stroke: var(--sakura-dark); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes drawPath { to { stroke-dashoffset: 0; } }
    canvas { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 10; }
    .action-btn { padding: 12px; font-size: 16px; border: none; border-radius: 8px; background: var(--washi-white); color: var(--text-main); cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; display: block; text-decoration: none;}
    .action-btn.primary { background: var(--sakura-dark); color: #fff; }
    .action-btn:hover { background: #EAEAEA; }
    .action-btn.primary:hover { background: #D66B80; }
    
    /* 底部彩蛋區塊 */
    footer { margin: 0 0 40px; text-align: center; color: var(--text-light); width: 100%; }
    .easter-egg { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #FFF3E0; color: #E65100; border-radius: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; max-width: 90%; }

    /* 手機版：維持小字體，確保大量留白且絕對置中 */
    @media (max-width: 500px) {
      .kana-grid { gap: 10px; width: 95%; margin-top: 20px; }
      .kana-card { border-radius: 12px; }
      .kana-char { font-size: 26px; margin-bottom: 6px; }
      .kana-char.yoon-text { font-size: 18px; } 
      .kana-romaji { font-size: 12px; }
      .confuse-pair { flex-direction: column; text-align: center; gap: 10px; }
      .pair-chars { width: auto; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🌸 日文五十音特訓班</h1>
    
    <div class="mode-switch">
      <button id="mode-learn" class="btn-mode active" onclick="switchMode('learn')">📖 學習區</button>
      <button id="mode-quiz" class="btn-mode" onclick="switchMode('quiz')">🔥 測驗區</button>
    </div>

    <div id="filter-controls">
      <div class="controls">
        <button id="btn-hiragana" class="btn active" onclick="setMainTab('hiragana')">平假名</button>
        <button id="btn-katakana" class="btn" onclick="setMainTab('katakana')">片假名</button>
      </div>
      <div class="controls sub-tabs">
        <button id="btn-seion" class="btn-sub active" onclick="setSubTab('seion')">清音</button>
        <button id="btn-dakuon" class="btn-sub" onclick="setSubTab('dakuon')">濁音/半濁音</button>
        <button id="btn-yoon" class="btn-sub" onclick="setSubTab('yoon')">拗音</button>
      </div>
    </div>
  </header>

  <main id="learn-section">
    <div class="kana-grid" id="kana-grid"></div>
    <section class="confusing-section">
      <h2>🧐 老師的特訓：易混淆字元辨識</h2>
      <div id="confusing-content"></div>
    </section>
  </main>

  <section id="quiz-section">
    <div class="stats-board" id="stats-board">目前還沒有錯題記錄，放馬過來吧！</div>
    
    <div class="session-stats">
      <div>✅ 答對<br><span id="session-correct" class="stat-num correct-text">0</span></div>
      <div style="width: 2px; background: #eee; height: 30px;"></div>
      <div>❌ 答錯<br><span id="session-wrong" class="stat-num wrong-text">0</span></div>
      <div style="width: 2px; background: #eee; height: 30px;"></div>
      <div>🎯 正確率<br><span id="session-accuracy" class="stat-num" style="color: var(--sakura-dark);">0%</span></div>
    </div>

    <div style="color: var(--text-light); font-weight: bold; margin-top: 5px;">請選出對應的假名：</div>
    <div class="quiz-question" id="quiz-question">ka</div>
    <div class="quiz-options" id="quiz-options"></div>
  </section>

  <footer>
    <p>每天進步一點點，日文一點都不難！</p>
    <div class="easter-egg" id="kansai-egg"></div>
  </footer>

  <div id="kana-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h3 id="modal-kana-title" style="margin: 0; font-size: 24px;">あ</h3>
      <div id="modal-romaji" style="color: var(--sakura-dark); margin-bottom: 15px;">【 a 】</div>
      <div class="canvas-wrapper">
        <div id="trace-char">あ</div>
        <div id="stroke-animation-container"></div>
        <canvas id="drawing-canvas" width="250" height="250"></canvas>
      </div>
      <div>
        <button class="action-btn primary" onclick="speakCurrentKana()">🔊 聽正確發音</button>
        <button class="action-btn" onclick="playStrokeAnimation()">▶️ 播放筆順動畫</button>
        <button class="action-btn" onclick="clearCanvas()">🧹 清除手寫字跡</button>
      </div>
    </div>
  </div>

  <script>

    const confusingData = [
      { pair: 'さ / き', desc: '平假名的「sa」跟「ki」長得很像！', mnemonic: 'さ 的肚子比較大，上面只有一條橫線；き 有兩條橫線！' },
      { pair: 'あ / お', desc: '平假名的「a」跟「o」也是新手陷阱。', mnemonic: 'あ 裡面有一個十字交叉；お 的右邊多了一點，而且一筆畫到底！' },
      { pair: 'ぬ / め', desc: '平假名的「nu」跟「me」就像雙胞胎。', mnemonic: 'ぬ 的尾巴有打結（像豬尾巴）；め 的尾巴是順順的收掉。' },
      { pair: 'シ / ツ', desc: '片假名大魔王：「shi」跟「tsu」。', mnemonic: 'シ (shi) 是由下往上提（兩點平平的）；ツ (tsu) 是由上往下撇（兩點直直的）。' },
      { pair: 'ソ / ン', desc: '片假名二號魔王：「so」跟「n」。', mnemonic: 'ソ (so) 從右上往下撇；ン (n) 從左下往上提（像打勾一樣）。' }
    ];

    const kansaiPhrases = [
      "💡 關西腔小教學：おおきに！ (謝謝！)",
      "💡 關西腔小教學：なんでやねん！ (搞什麼啊 / 吐槽用！)",
      "💡 關西腔小教學：ぼちぼちでんな (還過得去啦)",
      "💡 關西腔小教學：何して！くれんねん！ (你在搞什麼鬼啊！)"
    ];

    let currentMain = 'hiragana';
    let currentSub = 'seion';
    let currentMode = 'learn'; 
    let currentKana = '';

    /* =========================================
       🧠 2. AI 智慧測驗紀錄 & 本次統計
       ========================================= */
    let userStats = JSON.parse(localStorage.getItem('kanaStats')) || {};
    let sessionCorrect = 0;
    let sessionWrong = 0;

    function saveStats() {
      localStorage.setItem('kanaStats', JSON.stringify(userStats));
      updateStatsBoard();
    }

    function updateSessionStats() {
      document.getElementById('session-correct').innerText = sessionCorrect;
      document.getElementById('session-wrong').innerText = sessionWrong;
      const total = sessionCorrect + sessionWrong;
      const accuracy = total === 0 ? 0 : Math.round((sessionCorrect / total) * 100);
      document.getElementById('session-accuracy').innerText = accuracy + '%';
    }

    function getCurrentPool() { return database[currentMain][currentSub].filter(item => item !== null); }

    function getWeightedRandomKana(pool) {
      let weightedPool = [];
      pool.forEach(item => {
        let weight = 1; 
        if (userStats[item.k]) { weight = Math.max(1, 1 + (userStats[item.k].wrong * 3) - userStats[item.k].correct); }
        for(let i=0; i<weight; i++) { weightedPool.push(item); }
      });
      return weightedPool[Math.floor(Math.random() * weightedPool.length)];
    }

    function updateStatsBoard() {
      const board = document.getElementById('stats-board');
      const errors = Object.entries(userStats).filter(([k, v]) => v.wrong > 0).sort((a, b) => b[1].wrong - a[1].wrong).slice(0, 3);
      if (errors.length === 0) { board.innerText = "😎 目前完美零失誤！繼續保持！"; } 
      else { board.innerText = `🚨 歷史大魔王：${errors.map(e => `${e[0]}(錯${e[1].wrong}次)`).join('、')}`; }
    }

    /* =========================================
       🎮 3. 測驗遊戲邏輯
       ========================================= */
    let correctItem = null;
    let isAnswering = false;

    function nextQuestion() {
      isAnswering = false;
      const pool = getCurrentPool();
      correctItem = getWeightedRandomKana(pool);
      let options = [correctItem];
      while(options.length < 4) {
        let randomWrong = pool[Math.floor(Math.random() * pool.length)];
        if(!options.includes(randomWrong)) options.push(randomWrong);
      }
      options.sort(() => Math.random() - 0.5);

      document.getElementById('quiz-question').innerText = correctItem.r; 
      const optionsContainer = document.getElementById('quiz-options');
      optionsContainer.innerHTML = '';
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'quiz-btn';
        const fontSize = opt.k.length > 1 ? '28px' : '40px'; 
        btn.innerHTML = `<span style="font-size: ${fontSize}">${opt.k}</span>`;
        btn.onclick = () => handleAnswer(opt.k, btn);
        optionsContainer.appendChild(btn);
      });
    }

    function handleAnswer(selectedKana, btnElement) {
      if(isAnswering) return; 
      isAnswering = true;
      if(!userStats[correctItem.k]) userStats[correctItem.k] = { wrong: 0, correct: 0 };
      
      const allBtns = document.querySelectorAll('.quiz-btn');
      if (selectedKana === correctItem.k) {
        btnElement.classList.add('correct');
        userStats[correctItem.k].correct += 1;
        sessionCorrect += 1; 
        speakKana(correctItem.k);
        updateSessionStats(); 
        setTimeout(nextQuestion, 800);
      } else {
        btnElement.classList.add('wrong');
        userStats[correctItem.k].wrong += 1;
        sessionWrong += 1; 
        updateSessionStats(); 
        allBtns.forEach(b => { if(b.innerText === correctItem.k) b.classList.add('correct'); });
        setTimeout(nextQuestion, 1500);
      }
      saveStats();
    }

    /* =========================================
       🖥️ 4. 畫面切換與初始化
       ========================================= */
    window.onload = () => {
      renderGrid();
      updateStatsBoard();
      updateSessionStats();
      initSpeechAPI();
      initCanvas();
      renderConfusingSection();
      renderKansaiEgg();
    };

    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('mode-learn').classList.remove('active');
      document.getElementById('mode-quiz').classList.remove('active');
      document.getElementById(`mode-${mode}`).classList.add('active');

      if (mode === 'learn') {
        document.getElementById('learn-section').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
      } else {
        document.getElementById('learn-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'flex';
        nextQuestion(); 
      }
    }

    function setMainTab(type) {
      currentMain = type;
      document.getElementById('btn-hiragana').classList.remove('active');
      document.getElementById('btn-katakana').classList.remove('active');
      document.getElementById('btn-' + type).classList.add('active');
      if(currentMode === 'learn') renderGrid();
      if(currentMode === 'quiz') nextQuestion();
    }

    function setSubTab(type) {
      currentSub = type;
      document.getElementById('btn-seion').classList.remove('active');
      document.getElementById('btn-dakuon').classList.remove('active');
      document.getElementById('btn-yoon').classList.remove('active');
      document.getElementById('btn-' + type).classList.add('active');
      if(currentMode === 'learn') renderGrid();
      if(currentMode === 'quiz') nextQuestion();
    }

    function renderGrid() {
      const grid = document.getElementById('kana-grid');
      grid.innerHTML = '';
      database[currentMain][currentSub].forEach(item => {
        const div = document.createElement('div');
        if (!item) { div.className = 'kana-card empty'; } 
        else {
          div.className = 'kana-card';
          const yoonClass = item.k.length > 1 ? 'yoon-text' : '';
          div.innerHTML = `<div class="kana-char ${yoonClass}">${item.k}</div><div class="kana-romaji">${item.r}</div>`;
          div.onclick = () => openModal(item.k, item.r);
        }
        grid.appendChild(div);
      });
    }

    function renderConfusingSection() {
      const container = document.getElementById('confusing-content');
      container.innerHTML = '';
      confusingData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'confuse-pair';
        div.innerHTML = `<div class="pair-chars">${item.pair}</div><div class="pair-desc">${item.desc}<br><span class="mnemonic">💡 口訣：${item.mnemonic}</span></div>`;
        container.appendChild(div);
      });
    }

    function renderKansaiEgg() {
      document.getElementById('kansai-egg').innerText = kansaiPhrases[Math.floor(Math.random() * kansaiPhrases.length)];
    }

    /* =========================================
       🗣️ 5. 語音與畫布相關
       ========================================= */
    function initSpeechAPI() { if ('speechSynthesis' in window) window.speechSynthesis.getVoices(); }
    function speakKana(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel(); 
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP'; utterance.rate = 0.8;     
      window.speechSynthesis.speak(utterance);
    }
    function speakCurrentKana() { speakKana(currentKana); }

    function openModal(kana, romaji) {
      currentKana = kana;
      document.getElementById('modal-kana-title').innerText = kana;
      document.getElementById('modal-romaji').innerText = `【 ${romaji} 】`;
      const traceChar = document.getElementById('trace-char');
      traceChar.style.display = 'block'; 
      document.getElementById('stroke-animation-container').innerHTML = '';
      traceChar.innerText = kana; traceChar.style.fontSize = kana.length > 1 ? '110px' : '180px';
      document.getElementById('kana-modal').classList.add('show');
      clearCanvas(); speakKana(kana);
    }
    function closeModal() { document.getElementById('kana-modal').classList.remove('show'); document.getElementById('stroke-animation-container').innerHTML = ''; }
    window.onclick = function(event) { if (event.target === document.getElementById('kana-modal')) closeModal(); }

    /* =========================================
       🚀 6. CDN 光速筆順動畫 (解決手機網路不穩問題)
       ========================================= */
    async function playStrokeAnimation() {
      const container = document.getElementById('stroke-animation-container');
      const traceChar = document.getElementById('trace-char');
      traceChar.style.display = 'none'; 
      clearCanvas(); 

      // 換用全球最快的 jsDelivr CDN，解決手機抓不到 GitHub 原始檔的問題
      container.innerHTML = '<div style="color:#aaa; font-size:14px;">筆順載入中...</div>';
      try {
        container.innerHTML = '';
        for(let i = 0; i < currentKana.length; i++) {
          const char = currentKana.charAt(i);
          const unicode = char.charCodeAt(0).toString(16).padStart(5, '0');
          const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${unicode}.svg`;
          const response = await fetch(url);
          if(response.ok) {
            const wrapper = document.createElement('div'); wrapper.innerHTML = await response.text();
            const svg = wrapper.querySelector('svg');
            if(svg) {
              svg.style.width = currentKana.length > 1 ? '110px' : '200px';
              svg.style.height = currentKana.length > 1 ? '110px' : '200px';
              container.appendChild(svg);
            }
          } else {
             throw new Error("找不到檔案");
          }
        }
        let delay = 0;
        container.querySelectorAll('path').forEach(path => {
          const length = path.getTotalLength();
          path.style.strokeDasharray = length; path.style.strokeDashoffset = length;
          path.style.animation = `drawPath 0.6s ease forwards ${delay}s`; delay += 0.6; 
        });
      } catch (e) { 
        container.innerHTML = '<div style="color:red; font-size:14px;">網路不穩或無此字元動畫 😢</div>'; 
        setTimeout(() => { traceChar.style.display = 'block'; container.innerHTML = ''; }, 2500); 
      }
    }

    let canvas, ctx, isDrawing = false;
    function initCanvas() {
      canvas = document.getElementById('drawing-canvas'); if (!canvas) return;
      ctx = canvas.getContext('2d'); ctx.strokeStyle = '#4A4A4A'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseout', stopDrawing);
      canvas.addEventListener('touchstart', startDrawing, { passive: false }); canvas.addEventListener('touchmove', draw, { passive: false }); canvas.addEventListener('touchend', stopDrawing);
    }
    function getCoordinates(e) {
      const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function startDrawing(e) {
      if(e.type === 'touchstart') e.preventDefault(); isDrawing = true; const pos = getCoordinates(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
      document.getElementById('stroke-animation-container').innerHTML = ''; document.getElementById('trace-char').style.display = 'block';
    }
    function draw(e) { if (!isDrawing) return; if(e.type === 'touchmove') e.preventDefault(); const pos = getCoordinates(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDrawing() { if (!isDrawing) return; isDrawing = false; ctx.closePath(); }
    function clearCanvas() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }
  </script>
</body>
